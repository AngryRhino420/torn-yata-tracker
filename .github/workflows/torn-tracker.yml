name: Torn YATA Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Google credentials file
        shell: bash
        run: |
          printf '%s' "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 --decode > google-service-account.json

      - name: Inspect credentials file
        shell: bash
        run: |
          echo "=== FILE INFO ==="
          ls -l google-service-account.json || true
          wc -c google-service-account.json || true
          echo "=== FIRST 200 CHARS ==="
          python - <<'PY'
          from pathlib import Path
          p = Path("google-service-account.json")
          if not p.exists():
              print("FILE DOES NOT EXIST")
          else:
              text = p.read_text(encoding="utf-8", errors="replace")
              print(repr(text[:200]))
          PY

      - name: Validate Google credentials JSON
        run: |
          python - <<'PY'
          import json
          with open("google-service-account.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print("valid json")
          print(data.get("client_email", "missing client_email"))
          PY

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python torn_tracker.py
