name: Torn YATA Tracker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create Google credentials file
        shell: bash
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json

      - name: Validate Google credentials JSON
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("google-service-account.json")

          if not path.exists():
              raise Exception("Credentials file does not exist")

          if path.stat().st_size == 0:
              raise Exception("Credentials file is empty")

          with open(path, "r", encoding="utf-8") as f:
              data = json.load(f)

          print("Valid JSON")
          print("Service account:", data.get("client_email"))
          PY

      - name: Show working directory
        run: |
          pwd
          ls -la

      - name: Run tracker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SERVICE_ACCOUNT_FILE: google-service-account.json
        run: |
          python --version
          python torn_tracker.py
